# auxi/maestro/config.yaml
# Default values shared across flows. Individual flow YAMLs can override
# any field via the frontmatter at the top of the file.
#
# IMPORTANT: secrets do NOT live here. Pass QA_EMAIL / QA_PASSWORD via
# Maestro's `-e KEY=VALUE` flag at run time.

appId: com.auxi2026.app   # confirm against ./scripts/qa-boot.sh output

# Default env passed into every flow. Credentials are intentionally
# empty here — pass them at run time via Maestro's `-e` flag so they
# never land in CI logs, error reports, or the git history. Example:
#
#   maestro test maestro/flows/auth/login.yaml \
#     -e QA_EMAIL=qa-test@auxi.app -e QA_PASSWORD='QaTest!2026'
#
# The QA test account for local dev (qa-test@auxi.app / QaTest!2026)
# is documented in maestro/README.md and the user's memory.
env:
  QA_EMAIL: ""
  QA_PASSWORD: ""
  # Time budgets are sized for the slowest realistic path:
  # gpt-5-nano cold-call ~30s on the happy path, up to 180s if OpenAI
  # returns 502 (Cloudflare 60s Retry-After × 2 retries). See E-7 / E-9
  # in docs/qa-findings/2026-05-06-maestro-e2e-edge-cases.md.
  HOME_TIMEOUT_MS: 30000             # post-login → home-screen-root render (incl. bootstrap)
  RECOMMENDATION_TIMEOUT_MS: 180000  # post-login → first home-outfit-sheet-0 (LLM call)
  MODE_TIMEOUT_MS: 90000             # mode-pill change → outfit refetch (also LLM)
