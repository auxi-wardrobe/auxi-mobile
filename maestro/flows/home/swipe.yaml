# auxi/maestro/flows/home/swipe.yaml
# Home flow — Tinder-style swipe deck (supersedes the AU-303 two-axis flow).
# Spec: auxi/docs/superpowers/specs/2026-06-12-home-tinder-swipe-design.md
#   1. Header favourites shortcut present (heart → Favourite page, saved dot)
#   2. Swipe LEFT  = next suggestion (2/3, 3/3, …)
#   3. Swipe RIGHT = previous suggestion (back-nav; blocked on the first card)
#   4. Remix button present
#
# The header heart is a quick-access shortcut to the Favourite page (mint dot
# when looks are saved), not an inline save toggle. Swiping NAVIGATES the
# suggestion deck — LEFT goes forward, RIGHT goes back — and never saves;
# saving is exclusively the "Wear this" footer button now.
#
# Selector note: per-card testIDs are now keyed by the dynamic `outfitHash`
# (`home-outfit-sheet-<hash>`), so this flow asserts only on STABLE selectors:
# `home-swipe-deck`, `home-favourites-shortcut`, `home-remix`. Richer
# per-card / save-confirmation assertions need stable card testIDs (follow-up).
# Swipe-gesture fidelity (finger-follow, ±6° tilt, no-bounce spring) is verified
# by the iOS sim walk in the spec §8 — Maestro covers structure + regression.

appId: com.auxi2026.app
name: home-swipe
tags:
  - home
  - regression
env:
  HOME_TIMEOUT_MS: 30000
  RECOMMENDATION_TIMEOUT_MS: 180000
  FAVOURITE_TIMEOUT_MS: 30000
---
- runFlow: ../_shared/ensure-home.yaml

# --- 0. Wait for the deck (first outfit) to land ---
# /recommendation/start can take 30s+ (LLM cold-call). extendedWaitUntil
# absorbs the latency without polling.
- extendedWaitUntil:
    visible:
      id: home-swipe-deck
    timeout: ${RECOMMENDATION_TIMEOUT_MS}

# --- 1. Header favourites shortcut present ---
# The header heart is a quick-access shortcut to the Favourite page, not an
# inline save toggle. Assert it is present; tapping it would leave Home, so the
# swipe steps below cover the browse gestures.
- assertVisible:
    id: home-favourites-shortcut

# --- 2. Swipe LEFT = next card ---
- swipe:
    direction: LEFT
- waitForAnimationToEnd
- assertVisible:
    id: home-swipe-deck

# --- 3. Swipe RIGHT = previous card (back-nav) ---
# Swiping no longer saves. After the LEFT swipe above we're past the first
# card, so a RIGHT swipe steps BACK to the previous suggestion. (On the very
# first card a right-swipe rubber-bands and commits nothing.) Assert the deck
# survived the gesture.
- swipe:
    direction: RIGHT
- waitForAnimationToEnd
- assertVisible:
    id: home-swipe-deck

# --- 4. Remix affordance present ---
- assertVisible:
    id: home-remix
