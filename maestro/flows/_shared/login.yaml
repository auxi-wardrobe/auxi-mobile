# auxi/maestro/flows/_shared/login.yaml
# Reusable login sub-flow. Called via `runFlow: ../_shared/login.yaml`.
# Clears app state (keychain + storage) so the test always starts cold.

appId: com.auxi2026.app
---
- launchApp:
    clearState: true
    # On iOS, clearState alone does NOT wipe Keychain — the app stays
    # logged in across runs. Force a fresh-login state by clearing
    # the keychain too. (Maestro CLI flag, iOS-only.)
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: auth-email-input
    timeout: ${LOGIN_SCREEN_TIMEOUT_MS}
- tapOn:
    id: auth-email-input
- inputText: ${QA_EMAIL}
- tapOn:
    text: "Welcome Back"
- tapOn:
    id: auth-password-input
- inputText: ${QA_PASSWORD}
- tapOn:
    text: "Welcome Back"
- tapOn:
    id: auth-login-submit
- extendedWaitUntil:
    visible:
      id: home-screen-root
    timeout: ${HOME_TIMEOUT_MS}
