# auxi/maestro/flows/auth/au356-signup-reaches-password.yaml
# AU-356: in SIGN-UP mode, a valid brand-new email must advance to the
# PasswordCreation step — NOT bounce to SignIn.
#
# BUG (pre-fix): the enumeration-safe precheck returns provider:"password" to
# every anonymous caller (auth.ts), and EmailInputScreen unconditionally routed
# "password" -> SignIn. Result: EVERY new signup email (e.g. viettran@macgie.com)
# was blocked from ever reaching password creation.
#
# FIX (EmailInputScreen.tsx): signup mode now branches on `mode`, not the
# (unreliable-for-anonymous) provider value — any non-OAuth result in signup
# mode -> PasswordCreation. The genuinely-already-registered case is caught
# server-side at register time (409 EMAIL_ALREADY_EXISTS -> SignIn, see
# PasswordCreationScreen.tsx:164).
#
# This flow asserts the FIXED happy path: signup + a fresh email lands on the
# password-creation screen. The only Welcome->EmailInput entry passes
# mode:'signup' (WelcomeScreen.tsx:138), so this is the live user path.
#
# NOTE: use a UNIQUE email per run (timestamp/UUID) so it never collides with a
# real account — a collision would (correctly) 409 at register time and reroute
# to SignIn, which is a DIFFERENT path. We stop at PasswordCreation (pre-register)
# so anonymous-precheck behavior is what's under test, but keep the email novel.
#
# Run: maestro test maestro/flows/auth/au356-signup-reaches-password.yaml \
#        -e QA_NEW_EMAIL=qa-au356-$(date +%s)@example.com

appId: com.auxi2026.app
name: au356-signup-reaches-password
tags:
  - au-356
  - auth
  - uac
  - regression
env:
  QA_NEW_EMAIL: qa-au356-new@example.com
  LOGIN_SCREEN_TIMEOUT_MS: 10000
---
- launchApp:
    clearState: true
    clearKeychain: true

# Welcome -> EmailInput (mode:'signup', the only entry point).
- extendedWaitUntil:
    visible:
      id: welcome-cta-email
    timeout: ${LOGIN_SCREEN_TIMEOUT_MS}
- tapOn:
    id: welcome-cta-email

# Enter a valid, brand-new email.
- extendedWaitUntil:
    visible:
      id: email-input-field
    timeout: 5000
- tapOn:
    id: email-input-field
- inputText: ${QA_NEW_EMAIL}
- tapOn:
    id: email-submit-button

# AU-356 ASSERTION: signup + fresh email reaches PasswordCreation (NOT SignIn).
# The presence of the password-creation field is the fix's success signal.
- extendedWaitUntil:
    visible:
      id: password-input-field
    timeout: 10000
# The new email is carried through and shown read-only on the password screen.
- assertVisible:
    id: password-email-value
- assertVisible:
    text: ${QA_NEW_EMAIL}
# Submit affordance is present (user can now actually create the account).
- assertVisible:
    id: password-submit-button

# NEGATIVE GUARD: we must NOT have been bounced to the SignIn screen.
# (SignIn renders signin-password-input; its absence here confirms no bounce.)
- assertNotVisible:
    id: signin-password-input
