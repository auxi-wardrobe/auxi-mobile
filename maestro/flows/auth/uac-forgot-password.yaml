# auxi/maestro/flows/auth/uac-forgot-password.yaml
# AU-242 forgot-password request. Welcome → Email → PassCreation → 409
# → SignIn → tap "Forgot your password?" → Request → submit → CheckMail
# → tap "Back to Login" → SignIn.
#
# Does NOT exercise the reset link itself (needs deep-link token from
# uvicorn log; covered by future token-extract flow once AU-291 lands).

appId: com.auxi2026.app
name: uac-forgot-password
tags:
  - au-242
  - auth
  - uac
env:
  QA_EMAIL: qa-signin@auxi.app
  QA_PASSWORD: Pass1234
  LOGIN_SCREEN_TIMEOUT_MS: 10000
---
- launchApp:
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      id: welcome-cta-email
    timeout: ${LOGIN_SCREEN_TIMEOUT_MS}
- tapOn:
    id: welcome-cta-email

- extendedWaitUntil:
    visible:
      id: email-input-field
    timeout: 5000
- tapOn:
    id: email-input-field
- inputText: ${QA_EMAIL}
- tapOn:
    id: email-submit-button

- extendedWaitUntil:
    visible:
      id: password-input-field
    timeout: 5000
- tapOn:
    id: password-input-field
- inputText: ${QA_PASSWORD}
- tapOn:
    id: password-submit-button

- extendedWaitUntil:
    visible:
      id: signin-forgot-link
    timeout: 5000
- tapOn:
    id: signin-forgot-link

- extendedWaitUntil:
    visible:
      id: forgot-password-request-screen
    timeout: 5000
- assertVisible:
    text: ${QA_EMAIL}
- tapOn:
    id: forgot-password-submit

- extendedWaitUntil:
    visible:
      id: forgot-password-check-mail-screen
    timeout: 10000
- assertVisible:
    text: ${QA_EMAIL}
- tapOn:
    id: forgot-password-back-to-login

- extendedWaitUntil:
    visible:
      id: signin-password-input
    timeout: 5000
