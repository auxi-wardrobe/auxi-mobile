# auxi/maestro/flows/auth/login.yaml
# Login persists across cold relaunch (Keychain).

appId: org.reactjs.native.example.auxi
name: auth-login
tags:
  - auth
  - regression
---
# 1. Cold login from a clean state
- runFlow: ../_shared/login.yaml

# 2. Kill the app and relaunch — token in Keychain should still be valid
- stopApp
- launchApp:
    clearState: false
- assertVisible:
    id: home-screen-root
    timeout: ${HOME_TIMEOUT_MS}
- assertNotVisible:
    id: auth-email-input
