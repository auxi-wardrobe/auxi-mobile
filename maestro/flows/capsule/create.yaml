# auxi/maestro/flows/capsule/create.yaml
# Capsule Wardrobe — create-a-capsule happy path (spec §5 create wizard).
#
# testID-driven end-to-end: Wardrobe → wardrobe switcher → Create Capsule →
# create wizard (name → requirements) → generating → detail. Assumes a
# logged-in session (run ../_shared/login.yaml first) with a backend that
# serves /api/capsules. The sidebar/capsule-list entry was removed — the
# wardrobe switcher is now the sole entry point to capsule creation.
#
# NOTE: authored best-effort; not run headless in this session (no sim). The
# generating step depends on the synchronous backend generation resolving.
#
# Run: maestro test maestro/flows/capsule/create.yaml

appId: com.auxi2026.app
name: capsule-create
tags:
  - capsule
  - regression
env:
  GEN_TIMEOUT_MS: 30000
---
# 0. Start logged-in on Home.
- runFlow: ../_shared/login.yaml

# 1. From Home, hop to the Wardrobe tab (its header hosts the switcher).
- tapOn:
    id: home-footer-nav-wardrobe
- extendedWaitUntil:
    visible:
      id: wardrobe-switcher-title
    timeout: 10000

# 2. Open the wardrobe switcher, then tap "Create Capsule".
- tapOn:
    id: wardrobe-switcher-title
- extendedWaitUntil:
    visible:
      id: wardrobe-switcher-sheet
    timeout: 10000
- tapOn:
    id: wardrobe-switcher-create

# 3. Step 1 — name.
- extendedWaitUntil:
    visible:
      id: capsule-create-name-input
    timeout: 10000
- tapOn:
    id: capsule-create-name-input
- inputText: 'Work week'
- tapOn:
    id: capsule-create-continue

# 4. Step 2 — requirements.
- extendedWaitUntil:
    visible:
      id: capsule-info-outfit-target
    timeout: 10000
- tapOn:
    id: capsule-info-temp-min
- inputText: '10'
- tapOn:
    id: capsule-info-temp-max
- inputText: '20'
- tapOn:
    id: capsule-info-outfit-target
- inputText: '3'
- tapOn:
    id: capsule-info-create

# 5. Generating screen appears, then resolves into the detail screen.
- extendedWaitUntil:
    visible:
      id: capsule-generating-loader
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: capsule-detail-add
    timeout: ${GEN_TIMEOUT_MS}
