# Sentry upload coordinates for sentry-cli (dSYMs + Hermes sourcemaps).
# These are NON-SECRET project coordinates only.
#
# auth.token is INTENTIONALLY OMITTED — it must never be committed.
# The release-scoped token is supplied at build time via the
# SENTRY_AUTH_TOKEN environment variable (GitHub Actions secret in CI,
# shell export locally). When that env var is empty, the Xcode build
# phases set SENTRY_DISABLE_AUTO_UPLOAD=true and skip upload, so local
# Debug/Release builds without a token stay green.
defaults.url=https://sentry.io/
defaults.org=auxi
defaults.project=react-native
