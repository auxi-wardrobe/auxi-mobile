# auxi/tests/maestro/au-307/primary-pin.yaml
# AU-307 — Sub-flow A: PRIMARY pin flow.
#
# User taps a tile's pin badge from a fresh Home (no pin set), confirms
# "Keep this item", waits for /try_another (or /build) to fire, and asserts
# the pinned tile + skeleton + Generating header are wired correctly.
#
# Selector note (AU-307 BUG-3 followup): per-tile testIDs are now slot-indexed
# by deck position (active = outfit-0, peek = outfit-1) and slot index
# (`home-tile-pin-outfit-0-slot-N`). Exact-id selectors replace the previous
# `home-tile-pin-.*-N` regex + `index: 0` pattern, which was hitting wrong
# elements when the deck rendered a peek card with matching ids.
#
# Assertions stay deterministic — no temperature/copy/count assertions.

appId: com.auxi2026.app
name: au-307-primary-pin
tags:
  - home
  - pin
  - au-307
  - regression
env:
  HOME_TIMEOUT_MS: 30000
  RECOMMENDATION_TIMEOUT_MS: 180000
  MODAL_TIMEOUT_MS: 5000
  MODAL_DISMISS_TIMEOUT_MS: 5000
  PIN_GENERATE_TIMEOUT_MS: 90000   # /try_another with pinned_item_id; same LLM budget as refine
---
# --- 0. Boot to Home + wait for first outfit ---
- runFlow: ../../../maestro/flows/_shared/ensure-home.yaml
- extendedWaitUntil:
    visible:
      id: home-swipe-deck
    timeout: ${RECOMMENDATION_TIMEOUT_MS}

# --- 1. Tap the first tile's pin badge (unpinned state) ---
# Active deck card = outfit-0; first tile in the layout = slot-0.
# Exact id — no regex, no index qualifier needed (the peek card carries
# outfit-1 ids, so there is no collision).
- assertVisible:
    id: "home-tile-pin-outfit-0-slot-0"
- tapOn:
    id: "home-tile-pin-outfit-0-slot-0"

# --- 2. Confirm modal opens (variant = confirm) ---
- extendedWaitUntil:
    visible:
      id: pin-confirm-modal-root
    timeout: ${MODAL_TIMEOUT_MS}
- assertVisible:
    id: pin-confirm-modal-title
- assertVisible:
    id: pin-confirm-modal-image
- assertVisible:
    id: pin-confirm-modal-cancel
- assertVisible:
    id: pin-confirm-modal-confirm

# --- 3. Tap "Build around this" → CONFIRM_PIN dispatch ---
# Reducer: snapshot outfit → pinnedItemId=pending → modal=closed →
# outfit='generating' → fire /try_another with pinned_item_id.
- tapOn:
    id: pin-confirm-modal-confirm

# --- 4. Modal dismisses ---
- extendedWaitUntil:
    notVisible:
      id: pin-confirm-modal-root
    timeout: ${MODAL_DISMISS_TIMEOUT_MS}

# --- 5. Generating UI: header + skeleton tiles ---
# Header renders only while outfit==='generating'. Skeletons render in
# non-pinned slots of the active card (peek/back cards keep their data).
- assertVisible:
    id: home-pin-generating-header
# Skeleton in slot-0 is enough to assert "any skeleton visible" on the
# active card. Other non-pinned slots also render skeletons but we don't
# need to enumerate them.
- assertVisible:
    id: "home-tile-skeleton-outfit-0-slot-0"

# --- 6. Generation completes — skeleton AND header gone ---
# extendedWaitUntil polls notVisible; absorbs LLM round-trip without
# coupling to outfit copy. Once outfit==='idle', both UI elements unmount.
- extendedWaitUntil:
    notVisible:
      id: "home-tile-skeleton-outfit-0-slot-0"
    timeout: ${PIN_GENERATE_TIMEOUT_MS}
- assertNotVisible:
    id: home-pin-generating-header

# --- 7. Pinned tile still in the deck (set suffix proves pin survived) ---
# After GENERATE_SUCCESS, the pinned item retains its position in slot-0
# of the active card and its pin badge now carries the `-set` suffix.
- assertVisible:
    id: home-swipe-deck
- assertVisible:
    id: "home-tile-pin-outfit-0-slot-0-set"
- assertNotVisible:
    id: pin-generation-error
- assertNotVisible:
    id: pin-fallback-notice
