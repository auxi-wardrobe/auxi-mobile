# auxi/tests/maestro/au-307/replace-pin.yaml
# AU-307 — Sub-flow B: REPLACE pin flow.
#
# Precondition: one tile is already pinned (from primary-pin.yaml). User taps
# a DIFFERENT tile's pin badge → reducer routes PIN_TAP to modal='replace'
# (different itemId, pinnedItemId !== null). Confirming swaps the pinned id
# and fires generation again.
#
# Selector strategy: target the second tile via `home-tile-pin-.*-1` (regex
# matches dynamic outfitHash, suffix `-1` = flatTileIndex 1). The first tile
# (index 0) is already pinned (carries `-set` suffix from primary-pin.yaml).
#
# This file is designed to run AFTER primary-pin.yaml in the orchestrator —
# it intentionally does NOT call ensure-home (state is reused) but DOES
# assert the precondition (pinned badge on tile 0) so it fails loudly if run
# standalone.

appId: com.auxi2026.app
name: au-307-replace-pin
tags:
  - home
  - pin
  - replace
  - au-307
  - regression
env:
  MODAL_TIMEOUT_MS: 5000
  MODAL_DISMISS_TIMEOUT_MS: 5000
  PIN_GENERATE_TIMEOUT_MS: 90000
---
# --- 0. Precondition: tile 0 is pinned (from primary-pin.yaml) ---
# If this fails, the orchestrator skipped primary-pin or the previous
# generation failed silently. Fail fast.
- assertVisible:
    id: "home-tile-pin-.*-set"
- assertVisible:
    id: home-swipe-deck

# --- 1. Tap a DIFFERENT tile's pin badge (index 1, still unpinned) ---
# Suffix is plain `-1` (no `-set`) — second tile is not yet pinned.
- assertVisible:
    id: "home-tile-pin-.*-1"
    index: 0
- tapOn:
    id: "home-tile-pin-.*-1"
    index: 0

# --- 2. Replace modal opens (variant = replace) ---
# Same modal root + CTAs; the variant prop flips title to
# `pin.replace_title` ("Replace pinned item?"). The title testID is
# stable across variants — we assert presence, not text (translated copy
# would couple the flow to en locale).
- extendedWaitUntil:
    visible:
      id: pin-confirm-modal-root
    timeout: ${MODAL_TIMEOUT_MS}
- assertVisible:
    id: pin-confirm-modal-title
- assertVisible:
    id: pin-confirm-modal-image
- assertVisible:
    id: pin-confirm-modal-confirm
- assertVisible:
    id: pin-confirm-modal-cancel

# --- 3. Confirm replace → CONFIRM_REPLACE dispatch ---
# Reducer: snapshot outfit → pinnedItemId=pinReplaceCandidate (the new id)
# → modal=closed → outfit='generating' → fire generation.
- tapOn:
    id: pin-confirm-modal-confirm

# --- 4. Modal dismisses ---
- extendedWaitUntil:
    notVisible:
      id: pin-confirm-modal-root
    timeout: ${MODAL_DISMISS_TIMEOUT_MS}

# --- 5. Generating again (same UI contract as primary) ---
- assertVisible:
    id: home-wear-this-generating-spinner
- assertVisible:
    id: "home-tile-skeleton-.*"
    index: 0

# --- 6. Generation completes ---
- extendedWaitUntil:
    notVisible:
      id: "home-tile-skeleton-.*"
    timeout: ${PIN_GENERATE_TIMEOUT_MS}
- assertNotVisible:
    id: home-wear-this-generating-spinner

# --- 7. A pinned tile is still present (which slot now carries it is
#       determined by the BE response shape — could be original index 1 or
#       wherever the engine seated the new pinned item). We only assert
#       SOME pinned badge exists + deck survived + no error banner. ---
- assertVisible:
    id: home-swipe-deck
- assertVisible:
    id: "home-tile-pin-.*-set"
- assertNotVisible:
    id: pin-generation-error
- assertNotVisible:
    id: pin-fallback-notice
