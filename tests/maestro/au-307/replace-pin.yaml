# auxi/tests/maestro/au-307/replace-pin.yaml
# AU-307 — Sub-flow B: REPLACE pin flow.
#
# Precondition: one tile is already pinned (from primary-pin.yaml). User taps
# a DIFFERENT tile's pin badge → reducer routes PIN_TAP to modal='replace'
# (different itemId, pinnedItemId !== null). Confirming swaps the pinned id
# and fires generation again.
#
# Selector strategy (AU-307 BUG-3 followup): target the second tile via the
# exact slot-indexed id `home-tile-pin-outfit-0-slot-1` (active deck card,
# second tile). Slot 0 is already pinned (carries `-set` suffix from
# primary-pin.yaml) so the new pin target is slot 1. Exact ids replaced
# the previous `home-tile-pin-.*-1` regex which was mis-resolving to the
# view-toggle band (BUG-3, qa-mobile pass 2).
#
# This file is designed to run AFTER primary-pin.yaml in the orchestrator —
# it intentionally does NOT call ensure-home (state is reused) but DOES
# assert the precondition (pinned badge on tile 0) so it fails loudly if run
# standalone.

appId: com.auxi2026.app
name: au-307-replace-pin
tags:
  - home
  - pin
  - replace
  - au-307
  - regression
env:
  MODAL_TIMEOUT_MS: 5000
  MODAL_DISMISS_TIMEOUT_MS: 5000
  PIN_GENERATE_TIMEOUT_MS: 90000
---
# --- 0. Precondition: slot-0 of the active card is pinned (from primary-pin.yaml) ---
# If this fails, the orchestrator skipped primary-pin or the previous
# generation failed silently. Fail fast.
- assertVisible:
    id: "home-tile-pin-outfit-0-slot-0-set"
- assertVisible:
    id: home-swipe-deck

# --- 1. Tap a DIFFERENT tile's pin badge (slot 1, still unpinned) ---
# Suffix is plain (no `-set`) — second tile is not yet pinned. Exact id
# means we never collide with the peek card's `outfit-1-*` ids.
- assertVisible:
    id: "home-tile-pin-outfit-0-slot-1"
- tapOn:
    id: "home-tile-pin-outfit-0-slot-1"

# --- 2. Replace modal opens (variant = replace) ---
# Same modal root + CTAs; the variant prop flips title to
# `pin.replace_title` ("Replace pinned item?"). The title testID is
# stable across variants — we assert presence, not text (translated copy
# would couple the flow to en locale).
- extendedWaitUntil:
    visible:
      id: pin-confirm-modal-root
    timeout: ${MODAL_TIMEOUT_MS}
- assertVisible:
    id: pin-confirm-modal-title
- assertVisible:
    id: pin-confirm-modal-image
- assertVisible:
    id: pin-confirm-modal-confirm
- assertVisible:
    id: pin-confirm-modal-cancel

# --- 3. Confirm replace → CONFIRM_REPLACE dispatch ---
# Reducer: snapshot outfit → pinnedItemId=pinReplaceCandidate (the new id)
# → modal=closed → outfit='generating' → fire generation.
- tapOn:
    id: pin-confirm-modal-confirm

# --- 4. Modal dismisses ---
- extendedWaitUntil:
    notVisible:
      id: pin-confirm-modal-root
    timeout: ${MODAL_DISMISS_TIMEOUT_MS}

# --- 5. Generating again (same UI contract as primary) ---
- assertVisible:
    id: home-pin-generating-header
# Skeleton in slot-0 of the active card is enough to assert "any skeleton
# visible" — the non-pinned slots (including slot-0 here, since the pin
# now lives in slot-1) render skeletons during generation.
- assertVisible:
    id: "home-tile-skeleton-outfit-0-slot-0"

# --- 6. Generation completes ---
- extendedWaitUntil:
    notVisible:
      id: "home-tile-skeleton-outfit-0-slot-0"
    timeout: ${PIN_GENERATE_TIMEOUT_MS}
- assertNotVisible:
    id: home-pin-generating-header

# --- 7. A pinned tile is still present after replace. The BE response
#       reshuffles which slot carries the new pinned item — could be slot 0
#       or slot 1 of the active card. Assert both candidates so the flow
#       passes regardless of seat position. ---
- assertVisible:
    id: home-swipe-deck
# Maestro `id` is a regex anchor match — this matches either
# `home-tile-pin-outfit-0-slot-0-set` or `home-tile-pin-outfit-0-slot-1-set`
# without matching peek-card (`outfit-1`) ids.
- assertVisible:
    id: "home-tile-pin-outfit-0-slot-[01]-set"
- assertNotVisible:
    id: pin-generation-error
- assertNotVisible:
    id: pin-fallback-notice
