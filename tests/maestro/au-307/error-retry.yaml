# auxi/tests/maestro/au-307/error-retry.yaml
# AU-307 — Sub-flow C: ERROR + RETRY flow.
#
# Preconditions for the error path:
#   1. Backend MUST be running in forced-error mode for /api/v05/recommendation
#      build / try_another. Spec §10 + phase-07 expects an env flag like
#      V05_BUILD_FORCE_ERROR=true on the BE. As of authoring time, NO such
#      flag exists in wardrobe-backend (grep confirmed empty). See
#      `tests/maestro/au-307/README.md` "Open question" section — coordinate
#      with backend-dev BEFORE executing this flow.
#   2. Alternative (no BE change): use Maestro `mockServer` to intercept
#      /api/v05/recommendation/* and return 500. Heavier setup; defer until
#      env-flag decision lands.
#
# This file asserts the FE state machine response to GENERATE_ERROR +
# RETRY. The flow does NOT inject the error itself — that's a precondition
# the runner is responsible for.
#
# If the BE returns success (no error injected), this flow WILL FAIL on the
# `extendedWaitUntil visible: pin-generation-error` step — that's the
# desired loud failure (means the error-injection precondition wasn't met),
# not a flaky flow.

appId: com.auxi2026.app
name: au-307-error-retry
tags:
  - home
  - pin
  - error
  - au-307
  - regression
  - requires-backend-force-error
env:
  HOME_TIMEOUT_MS: 30000
  RECOMMENDATION_TIMEOUT_MS: 180000
  MODAL_TIMEOUT_MS: 5000
  MODAL_DISMISS_TIMEOUT_MS: 5000
  # Error surfaces from 30s client-side AbortController timeout OR earlier
  # BE 5xx. Either way budget the full 35s window per phase-07.
  PIN_ERROR_TIMEOUT_MS: 35000
  PIN_GENERATE_TIMEOUT_MS: 90000
---
# --- 0. Boot to Home (cold start path — no precondition on prior flows) ---
- runFlow: ../../../maestro/flows/_shared/ensure-home.yaml
- extendedWaitUntil:
    visible:
      id: home-swipe-deck
    timeout: ${RECOMMENDATION_TIMEOUT_MS}

# --- 1. Tap pin badge on the first tile ---
- assertVisible:
    id: "home-tile-pin-.*-0"
    index: 0
- tapOn:
    id: "home-tile-pin-.*-0"
    index: 0

# --- 2. Confirm modal opens; confirm "Build around this" ---
- extendedWaitUntil:
    visible:
      id: pin-confirm-modal-root
    timeout: ${MODAL_TIMEOUT_MS}
- tapOn:
    id: pin-confirm-modal-confirm
- extendedWaitUntil:
    notVisible:
      id: pin-confirm-modal-root
    timeout: ${MODAL_DISMISS_TIMEOUT_MS}

# --- 3. Generation fails → pin-generation-error banner appears ---
# Reducer: GENERATE_ERROR → restore snapshot → outfit='error' → inline
# banner renders. Banner carries `pin-generation-error` testID and
# embeds a Retry button (`pin-generation-error-retry`).
- extendedWaitUntil:
    visible:
      id: pin-generation-error
    timeout: ${PIN_ERROR_TIMEOUT_MS}
- assertVisible:
    id: pin-generation-error-retry

# Sanity: the Generating header is gone (outfit transitioned out of
# 'generating' into 'error'). Catches a reducer regression where the
# header lingers under the error banner.
- assertNotVisible:
    id: home-pin-generating-header

# --- 4. Tap Retry → RETRY dispatch → outfit='generating' again ---
- tapOn:
    id: pin-generation-error-retry

# --- 5. Generation re-fires (header back, banner gone for now) ---
# Use extendedWaitUntil so we don't race the dispatch → render transition.
- extendedWaitUntil:
    visible:
      id: home-pin-generating-header
    timeout: ${MODAL_TIMEOUT_MS}
- assertNotVisible:
    id: pin-generation-error

# --- 6. Terminal: either success OR the error returns (depends on whether
#       the BE force-error flag is still on for the retry). We don't fail
#       on either outcome — Maestro can't conditionally branch, so we just
#       poll for outfit==='idle' OR outfit==='error' by waiting for the
#       Generating header to leave. ---
- extendedWaitUntil:
    notVisible:
      id: home-pin-generating-header
    timeout: ${PIN_GENERATE_TIMEOUT_MS}
- assertVisible:
    id: home-swipe-deck
